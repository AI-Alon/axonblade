<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AxonBlade Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: "Segoe UI", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 1.2rem;
      color: #00d4ff;
      flex: 1;
    }

    select, button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #00d4ff44;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button:hover { background: #00d4ff22; }
    button#run-btn { background: #00aa44; border-color: #00aa44; color: #fff; }
    button#run-btn:hover { background: #00cc55; }

    /* ── Main layout ─────────────────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Editor pane — 55% */
    #editor-pane {
      width: 55%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
    }

    #editor {
      flex: 1;
      background: #0d1117;
      color: #c9d1d9;
      font-family: "Fira Code", "Cascadia Code", monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 16px;
      border: none;
      outline: none;
      resize: none;
      tab-size: 4;
      overflow-y: auto;
    }

    /* Output pane — 45% */
    #output-pane {
      width: 45%;
      display: flex;
      flex-direction: column;
    }

    .pane-label {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 6px 12px;
      font-size: 0.75rem;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #output {
      flex: 0 0 40%;
      background: #0d1117;
      font-family: "Fira Code", monospace;
      font-size: 13px;
      padding: 12px;
      overflow-y: auto;
      white-space: pre-wrap;
      border-bottom: 1px solid #0f3460;
    }

    #output.error { color: #ff6b6b; }

    #grid-section { flex: 1; display: flex; flex-direction: column; }

    #canvas-container {
      flex: 1;
      overflow: auto;
      padding: 12px;
      display: flex;
      align-items: flex-start;
    }

    canvas {
      image-rendering: pixelated;
      border: 1px solid #0f3460;
    }

    /* ── Status bar ──────────────────────────────────────────────────── */
    #status {
      background: #16213e;
      border-top: 1px solid #0f3460;
      padding: 4px 12px;
      font-size: 0.75rem;
      color: #888;
    }

    #status.loading { color: #f0c040; }
    #status.ready   { color: #00aa44; }
    #status.running { color: #00d4ff; }
    #status.error   { color: #ff6b6b; }
  </style>
</head>
<body>

<header>
  <h1>AxonBlade Playground</h1>
  <select id="examples-select">
    <option value="">Examples ▾</option>
    <option value="hello">Hello World</option>
    <option value="fibonacci">Fibonacci</option>
    <option value="closures">Closures</option>
    <option value="snake">Snake (grid)</option>
    <option value="life">Game of Life</option>
  </select>
  <button id="run-btn">▶ Run</button>
</header>

<main>
  <!-- Left: editor -->
  <div id="editor-pane">
    <div class="pane-label">Editor</div>
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off">write(-*cyan*- + "Hello, AxonBlade!" + -*reset*-)
</textarea>
  </div>

  <!-- Right: output + canvas -->
  <div id="output-pane">
    <div class="pane-label">Output</div>
    <pre id="output">Ready.</pre>

    <div id="grid-section">
      <div class="pane-label">Grid</div>
      <div id="canvas-container">
        <canvas id="grid-canvas"></canvas>
      </div>
    </div>
  </div>
</main>

<div id="status" class="loading">Loading Python runtime…</div>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<script src="canvas_grid.js"></script>
<script>
"use strict";

// ── Example programs ───────────────────────────────────────────────────────

const EXAMPLES = {
  hello: `write(-*cyan*- + "Hello, AxonBlade!" + -*reset*-)
`,
  fibonacci: `bladeFN fib(n#int) +/
    if n <= 1 +/
        return n
    ECB
    return fib(n - 1) + fib(n - 2)
ECB

>> i = 0
while i < 10 +/
    write(fib(i))
    i = i + 1
ECB
`,
  closures: `bladeFN make_counter(start#int) +/
    >> count = start
    bladeFN increment() +/
        count = count + 1
        return count
    ECB
    return increment
ECB

>> c = make_counter(0)
write(c())
write(c())
write(c())
`,
  snake: `>> g = grid(20, 15)
>> snake = [{x: 10, y: 7}]
>> dir = {x: 1, y: 0}
>> food = {x: 5, y: 5}

bladeFN place_food() +/
    g.set(food~"x"~, food~"y"~, -*red*-)
    g.set_char(food~"x"~, food~"y"~, "*")
ECB

bladeFN draw() +/
    g.fill(-*black*-)
    place_food()
    for seg in snake +/
        g.set(seg~"x"~, seg~"y"~, -*green*-)
    ECB
ECB

draw()
`,
  life: `>> W = 20
>> H = 10
>> g = grid(W, H)

bladeFN make_board() +/
    >> board = []
    >> y = 0
    while y < H +/
        >> row = []
        >> x = 0
        while x < W +/
            row.append(0)
            x = x + 1
        ECB
        board.append(row)
        y = y + 1
    ECB
    return board
ECB

>> board = make_board()
board~5~~5~ = 1
board~5~~6~ = 1
board~6~~5~ = 1
board~6~~6~ = 1

>> y = 0
while y < H +/
    >> x = 0
    while x < W +/
        if board~y~~x~ == 1 +/
            g.set(x, y, -*green*-)
        ECB
        x = x + 1
    ECB
    y = y + 1
ECB
`,
};

// ── UI elements ────────────────────────────────────────────────────────────

const editorEl  = document.getElementById("editor");
const outputEl  = document.getElementById("output");
const canvasEl  = document.getElementById("grid-canvas");
const statusEl  = document.getElementById("status");
const runBtn    = document.getElementById("run-btn");
const examplesEl = document.getElementById("examples-select");

// ── Pyodide bootstrap ──────────────────────────────────────────────────────

let pyodide = null;

async function initPyodide() {
  setStatus("loading", "Loading Python 3.11 WASM runtime…");
  try {
    pyodide = await loadPyodide();
    // Load the axonblade package from the parent directory
    // In a deployed environment this would be installed via micropip.
    // For local development we mount the source files.
    await pyodide.loadPackage("micropip");
    setStatus("ready", "Python runtime ready — press Run or Ctrl+Enter");
  } catch (err) {
    setStatus("error", `Failed to load Pyodide: ${err}`);
  }
}

async function loadAxonBlade() {
  // Mount AxonBlade source files into Pyodide's virtual filesystem.
  // This is the simplest zero-build approach for development.
  // In production you would: await micropip.install("axonblade")
  const files = [
    ["core/__init__.py",      ""],
    ["core/tokens.py",        null],
    ["core/lexer.py",         null],
    ["core/ast_nodes.py",     null],
    ["core/parser.py",        null],
    ["core/environment.py",   null],
    ["core/evaluator.py",     null],
    ["core/errors.py",        null],
    ["core/module_loader.py", null],
    ["grid/__init__.py",      ""],
    ["grid/grid_object.py",   null],
    ["grid/renderer_term.py", null],
    ["stdlib/__init__.py",    ""],
    ["stdlib/builtins.py",    null],
    ["playground/__init__.py",""],
    ["playground/bridge.py",  null],
  ];

  pyodide.FS.mkdir("/axonblade");
  pyodide.FS.mkdir("/axonblade/core");
  pyodide.FS.mkdir("/axonblade/grid");
  pyodide.FS.mkdir("/axonblade/stdlib");
  pyodide.FS.mkdir("/axonblade/playground");

  for (const [relPath, content] of files) {
    const dest = `/axonblade/${relPath}`;
    if (content !== null) {
      // Fetch from the server relative to playground/
      const resp = await fetch(`../${relPath}`);
      const text = await resp.text();
      pyodide.FS.writeFile(dest, text);
    } else {
      pyodide.FS.writeFile(dest, content ?? "");
    }
  }

  // Also copy stdlib .axb files
  pyodide.FS.mkdir("/axonblade/stdlib");
  for (const mod of ["math", "string"]) {
    const resp = await fetch(`../stdlib/${mod}.axb`);
    const text = await resp.text();
    pyodide.FS.writeFile(`/axonblade/stdlib/${mod}.axb`, text);
  }

  await pyodide.runPythonAsync(`
import sys
sys.path.insert(0, "/axonblade")
`);
}

// ── Run handler ────────────────────────────────────────────────────────────

async function runProgram() {
  if (!pyodide) {
    setStatus("error", "Pyodide not loaded yet");
    return;
  }

  setStatus("running", "Running…");
  outputEl.className = "";
  outputEl.textContent = "";
  clearCanvas(canvasEl);

  const source = editorEl.value;

  try {
    // Ensure axonblade is loaded
    await loadAxonBlade();

    const result = await pyodide.runPythonAsync(`
from playground.bridge import run as _axb_run
import json
_r = _axb_run(${JSON.stringify(source)})
json.dumps({"output": _r["output"], "error": _r["error"], "grid_state": _r["grid_state"]})
`);

    const data = JSON.parse(result);

    if (data.error) {
      outputEl.className = "error";
      outputEl.textContent = data.error;
      setStatus("error", "Runtime error");
    } else {
      outputEl.textContent = data.output || "(no output)";
      setStatus("ready", "Done");
    }

    if (data.grid_state && data.grid_state.length > 0) {
      renderGrid(data.grid_state, canvasEl, 20);
    }

  } catch (err) {
    outputEl.className = "error";
    outputEl.textContent = String(err);
    setStatus("error", "Error");
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────

function setStatus(cls, msg) {
  statusEl.className = cls;
  statusEl.textContent = msg;
}

// ── Event wiring ───────────────────────────────────────────────────────────

runBtn.addEventListener("click", runProgram);

editorEl.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
    e.preventDefault();
    runProgram();
  }
  // Insert 4 spaces for Tab
  if (e.key === "Tab") {
    e.preventDefault();
    const start = editorEl.selectionStart;
    const end   = editorEl.selectionEnd;
    editorEl.value = editorEl.value.substring(0, start) + "    " + editorEl.value.substring(end);
    editorEl.selectionStart = editorEl.selectionEnd = start + 4;
  }
});

examplesEl.addEventListener("change", () => {
  const key = examplesEl.value;
  if (key && EXAMPLES[key]) {
    editorEl.value = EXAMPLES[key];
    examplesEl.value = "";
  }
});

// ── Boot ───────────────────────────────────────────────────────────────────
initPyodide();
</script>
</body>
</html>
