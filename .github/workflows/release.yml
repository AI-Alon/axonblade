name: Release

on:
  push:
    tags:
      - "v2.*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build — Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyinstaller>=6.0

      - name: Build binary
        run: pyinstaller axonblade.spec

      - name: Rename output
        run: mv dist/ablade dist/ablade-linux-x64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ablade-linux-x64

  build-macos-arm:
    name: Build — macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyinstaller>=6.0

      - name: Build binary
        run: pyinstaller axonblade.spec

      - name: Rename output
        run: mv dist/ablade dist/ablade-macos-arm64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ablade-macos-arm64

  build-macos-x64:
    name: Build — macOS x64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyinstaller>=6.0

      - name: Build binary
        run: pyinstaller axonblade.spec

      - name: Rename output
        run: mv dist/ablade dist/ablade-macos-x64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ablade-macos-x64

  build-windows:
    name: Build — Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyinstaller>=6.0

      - name: Build binary
        run: pyinstaller axonblade.spec

      - name: Rename output
        run: mv dist\ablade.exe dist\ablade-windows-x64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ablade-windows-x64.exe
